name: ${COMPOSE_PROJECT_NAME:-cs2-matchzy}

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - admin_panel_mongodb:/data/db

  admin-panel:
    build:
      context: .
      dockerfile: admin-panel/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
    expose:
      - "8080"
    ports:
      - "127.0.0.1:${ADMIN_PANEL_PORT:-8080}:8080"
    environment:
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD:?ADMIN_PANEL_PASSWORD is required}
      ADMIN_PANEL_SESSION_SECRET: ${ADMIN_PANEL_SESSION_SECRET:?ADMIN_PANEL_SESSION_SECRET is required}
      ADMIN_PANEL_PORT: 8080
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/cs2_admin_panel}
      MONGODB_DB: ${MONGODB_DB:-cs2_admin_panel}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-cs2-matchzy}
      ADMIN_PANEL_CONTROL_MODE: ${ADMIN_PANEL_CONTROL_MODE:-docker}
      ADMIN_PANEL_RUNTIME_ENV_FILE: /runtime/settings.env
      ADMIN_PANEL_RUNTIME_ADMINS_FILE: /runtime/csharp-admins.json
      ADMIN_PANEL_RUNTIME_MATCHZY_ADMINS_FILE: /runtime/matchzy-admins.json
      ADMIN_PANEL_RUNTIME_MATCHZY_NADES_FILE: /runtime/matchzy-savednades.json
      ADMIN_PANEL_LIVE_MATCHZY_NADES_FILE: /cs2-data/game/csgo/cfg/MatchZy/savednades.json
      ADMIN_PANEL_NADES_SYNC_ENABLED: ${ADMIN_PANEL_NADES_SYNC_ENABLED:-1}
      ADMIN_PANEL_NADES_SYNC_INTERVAL_MS: ${ADMIN_PANEL_NADES_SYNC_INTERVAL_MS:-2000}
      ADMIN_PANEL_CS2_SERVICE: cs2
      ADMIN_PANEL_CS2_CONTAINER: ${ADMIN_PANEL_CS2_CONTAINER:-}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN:?UPLOADTHING_TOKEN is required}
    volumes:
      - admin_panel_runtime:/runtime
      - cs2_data:/cs2-data
      - /var/run/docker.sock:/var/run/docker.sock

  cs2:
    build:
      context: .
      dockerfile: cs2/Dockerfile
    restart: unless-stopped
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
      - "27020:27020/udp"
    environment:
      SRCDS_TOKEN: ${SRCDS_TOKEN:?SRCDS_TOKEN is required}
      CS2_SERVERNAME: ${CS2_SERVERNAME:-CS2 MatchZy Server}
      CS2_RCONPW: ${CS2_RCONPW:?CS2_RCONPW is required}
      CS2_PW: ${CS2_PW:-}
      CS2_MAXPLAYERS: ${CS2_MAXPLAYERS:-10}
      CS2_STARTMAP: ${CS2_STARTMAP:-de_mirage}
      CS2_PORT: ${CS2_PORT:-27015}
      TV_PORT: ${TV_PORT:-27020}
      CS2_ADDITIONAL_ARGS: ${CS2_ADDITIONAL_ARGS:-}
      STEAMAPPDIR: /home/steam/cs2-dedicated
      METAMOD_VERSION: ${METAMOD_VERSION:-latest}
      MATCHZY_VERSION: ${MATCHZY_VERSION:-latest}
      COUNTERSTRIKESHARP_VERSION: ${COUNTERSTRIKESHARP_VERSION:-latest}
      FAKE_RCON_ENABLED: ${FAKE_RCON_ENABLED:-1}
      FAKE_RCON_VERSION: ${FAKE_RCON_VERSION:-latest}
      WEAPONPAINTS_ENABLED: ${WEAPONPAINTS_ENABLED:-1}
      WEAPONPAINTS_VERSION: ${WEAPONPAINTS_VERSION:-latest}
      FORTNITE_EMOTES_ENABLED: ${FORTNITE_EMOTES_ENABLED:-1}
      FORTNITE_EMOTES_VERSION: ${FORTNITE_EMOTES_VERSION:-latest}
      FORTNITE_EMOTES_WORKSHOP_ADDON_ID: ${FORTNITE_EMOTES_WORKSHOP_ADDON_ID:-3328582199}
      MULTIADDONMANAGER_VERSION: ${MULTIADDONMANAGER_VERSION:-latest}
      RAYTRACE_VERSION: ${RAYTRACE_VERSION:-latest}
      CS2_WORKSHOP_MAPS_ENABLED: ${CS2_WORKSHOP_MAPS_ENABLED:-1}
      CS2_WORKSHOP_MAPS: ${CS2_WORKSHOP_MAPS:-}
      CS2_WORKSHOP_FORCE_DOWNLOAD: ${CS2_WORKSHOP_FORCE_DOWNLOAD:-0}
      EXECUTES_ENABLED: ${EXECUTES_ENABLED:-1}
      EXECUTES_VERSION: ${EXECUTES_VERSION:-latest}
      SIMPLEADMIN_ENABLED: ${SIMPLEADMIN_ENABLED:-1}
      SIMPLEADMIN_VERSION: ${SIMPLEADMIN_VERSION:-latest}
      PLAYERSETTINGS_VERSION: ${PLAYERSETTINGS_VERSION:-latest}
      ANYBASELIB_VERSION: ${ANYBASELIB_VERSION:-latest}
      MENUMANAGER_VERSION: ${MENUMANAGER_VERSION:-latest}
      MATCHZY_SMOKE_COLOR: ${MATCHZY_SMOKE_COLOR:-0}
      MATCHZY_SAVE_NADES_AS_GLOBAL: ${MATCHZY_SAVE_NADES_AS_GLOBAL:-1}
      MATCHZY_CHAT_PREFIX: ${MATCHZY_CHAT_PREFIX:-}
      ADMINS: ${ADMINS:-}
      CS2_RUNTIME_ENV_FILE: /config-runtime/settings.env
      CSHARP_ADMINS_FILE: /config-runtime/csharp-admins.json
      MATCHZY_ADMINS_FILE: /config-runtime/matchzy-admins.json
      MATCHZY_SAVEDNADES_FILE: /config-runtime/matchzy-savednades.json
      MOD_REINSTALL: ${MOD_REINSTALL:-0}
    volumes:
      - cs2_data:/home/steam/cs2-dedicated
      - admin_panel_runtime:/config-runtime

volumes:
  admin_panel_mongodb:
  admin_panel_runtime:
  cs2_data:
